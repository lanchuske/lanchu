<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Lanchu — control and trust layer for AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0b1a1c"/>
    </linearGradient>
    <style>
      .h  { fill:#e6edf3; font:700 66px -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; letter-spacing:-1.5px; }
      .sub{ fill:#9aa4af; font:400 29px -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
      .word{ fill:#e6edf3; font:700 40px -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; letter-spacing:-0.5px; }
      .cmd{ fill:#4dd0c1; font:500 30px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .foot{ fill:#7d8894; font:500 26px -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    </style>
  </defs>

  <!-- full square background so qlmanage keeps 1:1; content lives in the central 630-tall band -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- central band: y in [285, 915] -->
  <g transform="translate(0,285)">
    <rect x="0" y="0" width="1200" height="8" fill="#0b7285"/>

    <!-- brand -->
    <g transform="translate(90,74)">
      <rect width="64" height="64" rx="14" fill="#0b7285"/>
      <g fill="#ffffff">
        <rect x="16" y="19" width="24" height="6" rx="3"/>
        <rect x="16" y="29" width="32" height="6" rx="3"/>
        <rect x="16" y="39" width="18" height="6" rx="3"/>
      </g>
      <text class="word" x="82" y="46">Lanchu</text>
    </g>

    <!-- headline -->
    <text class="h" x="90" y="278">Control &amp; trust layer</text>
    <text class="h" x="90" y="354">for your AI agents</text>

    <!-- subline -->
    <text class="sub" x="90" y="418">Coordinate without collisions. Keep each agent in its lane.</text>
    <text class="sub" x="90" y="456">Audit everything.</text>

    <!-- command chip -->
    <g transform="translate(90,496)">
      <rect width="360" height="62" rx="12" fill="#161b22" stroke="#232a31"/>
      <text class="cmd" x="26" y="40"><tspan fill="#7d8894">$ </tspan>npx lanchu</text>
    </g>

    <!-- footer -->
    <text class="foot" x="90" y="604">Open source · MCP-native · 100% local · lanchu.ar</text>
  </g>
</svg>
